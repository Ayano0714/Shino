<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>上毛かるた</title>

<style>
body {
    background: #E6E6FA;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: "Yu Gothic", sans-serif;
}

.container {
    text-align: center;
}

.card {
    background: #FFF8DC;
    border: 5px ridge #aaa;
    width: 500px;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: bold;
    cursor: pointer;

    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.button {
    background: #FFF8DC;
    border: 5px ridge #aaa;
    width: 500px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    margin-top: 15px;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="menu" class="container">
    <div class="card">上毛かるた</div>
    <div class="button" onclick="startGame('order')">50音順</div>
    <div class="button" onclick="startGame('random')">ランダム</div>
</div>

<div id="game" class="container" style="display:none;">
    <div id="card" class="card"></div>
</div>

<script>
let cards = [
["あ","浅間のいたずら鬼の押出し","あさまのいたずらおにのおしだし"],
["い","伊香保温泉日本の名湯","いかほおんせんにほんのめいとう"],
["う","碓氷峠の関所跡","うすいとうげのせきしょあと"],
["え","縁起だるまの少林山","えんぎだるまのしょうりんざん"],
["お","太田金山子育呑龍","おおたかなやまこそだてどんりゅう"],

["か","関東と信越つなぐ高崎市","かんとうとしんえつつなぐたかさきし"],
["き","桐生は日本の機どころ","きりゅうはにほんのはたどころ"],
["く","草津よいとこ薬の温泉","くさづよいとこくすりのいでゆ"],
["け","県都前橋生糸の市","けんとまえばしいとのまち"],
["こ","心の燈台内村鑑三","こころのとうだいうちむらかんぞう"],

["さ","三波石と共に名高い冬桜","さんばせきとともになだかいふゆざくら"],
["し","しのぶ毛の国二子塚","しのぶけのくにふたごづか"],
["す","裾野は長し赤城山","すそのはながしあかぎやま"],
["せ","仙境尾瀬沼花の原","せんきょうおぜぬまはなのはら"],
["そ","そろいの支度で八木節音頭","そろいのしたくでやぎぶしおんど"],

["た","滝は吹割片品渓谷","たきはふきわれかたしなけいこく"],
["ち","力あわせる二百万","ちからあわせるにひゃくまん"],
["つ","つる舞う形の群馬県","つるまうかたちのぐんまけん"],
["て","天下の義人茂左衛門","てんかのぎじんもざえもん"],
["と","利根は坂東一の川","とねはばんどういちのかわ"],

["な","中仙道しのぶ安中杉並木","なかせんどうしのぶあんなかすぎなみき"],
["に","日本で最初の富岡製糸","にほんでさいしょのとみおかせいし"],
["ぬ","沼田城下の塩原太助","ぬまたじょうかのしおばらたすけ"],
["ね","ねぎとこんにゃく下仁田名産","ねぎとこんにゃくしもにためいさん"],
["の","登る榛名のキャンプ村","のぼるはるなのきゃんぷむら"],

["は","花山公園つゝじの名所","はなやまこうえんつつじのめいしょ"],
["ひ","白衣観音慈悲の御手","びゃくいかんのんじひのみて"],
["ふ","分福茶釜の茂林寺","ぶんぶくちゃがまのもりんじ"],
["へ","平和の使徒新島襄","へいわのつかいにいじまじょう"],
["ほ","誇る文豪田山花袋","ほこるぶんごうたやまかたい"],

["ま","繭と生糸は日本一","まゆときいとはにほんいち"],
["み","水上谷川スキーと登山","みなかみたにがわすきーととざん"],
["む","昔を語る多胡の古碑","むかしをかたるたごのこひ"],
["め","銘仙織り出す伊勢崎市","めいせんおりだすいせさきし"],
["も","紅葉に映える妙義山","もみじにはえるみょうぎさん"],

["や","耶馬渓しのぐ吾妻峡","やばけいしのぐあがつまきょう"],
["ゆ","ゆかりは古し貫前神社","ゆかりはふるしぬきさきじんじゃ"],
["よ","世のちり洗う四万温泉","よのちりあらうしまおんせん"],

["ら","雷と空風義理人情","らいとからっかぜぎりにんじょう"],
["り","理想の電化に電源群馬","りそうのでんかにでんげんぐんま"],
["る","ループで名高い清水トンネル","るーぷでなだかいしみずとんねる"],
["れ","歴史に名高い新田義貞","れきしになだかいにったよしさだ"],
["ろ","老農船津傳次平","ろうのうふなつでんじべい"],

["わ","和算の大家関孝和","わさんのたいかせきこうわ"]
];

let current = 0;
let showAnswer = false;

function startGame(mode){
    document.getElementById("menu").style.display = "none";
    document.getElementById("game").style.display = "block";

    if(mode === "random"){
        cards.sort(() => Math.random() - 0.5);
    } else {
        cards.sort((a,b)=> a[0].localeCompare(b[0]));
    }

    current = 0;
    showAnswer = false;
    showCard();
}

function showCard(){
    document.getElementById("card").innerText = cards[current][0];
}

document.getElementById("card").onclick = function(){
    if(!showAnswer){
        this.innerText = cards[current][1] + "\n" + cards[current][2];
        showAnswer = true;
    } else {
        current = (current + 1) % cards.length;
        this.innerText = cards[current][0];
        showAnswer = false;
    }
}
</script>

</body>
</html>
